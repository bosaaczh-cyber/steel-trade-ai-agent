
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GMT.AI{% endblock %} — 钢贸通</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep:       #06080d;
            --bg-primary:    #0b0f18;
            --bg-secondary:  #101624;
            --bg-card:       #131b2e;
            --bg-card-hover: #182038;
            --bg-elevated:   #1a2340;

            --border:        rgba(255,255,255,0.06);
            --border-light:  rgba(255,255,255,0.10);
            --border-accent: rgba(100,160,255,0.15);

            --text-primary:   #eaeff8;
            --text-secondary: #8294b4;
            --text-muted:     #4e6080;

            --accent:         #4d8eff;
            --accent-bright:  #6ea3ff;
            --accent-glow:    rgba(77,142,255,0.08);
            --accent-glow-strong: rgba(77,142,255,0.18);

            --gold:           #d4a853;
            --gold-glow:      rgba(212,168,83,0.10);

            --success:        #34d399;
            --success-bg:     rgba(52,211,153,0.08);
            --danger:         #f87171;
            --danger-bg:      rgba(248,113,113,0.08);
            --warning:        #fbbf24;
            --warning-bg:     rgba(251,191,36,0.08);

            --grade-a:        #fbbf24;
            --grade-b:        #4d8eff;
            --grade-c:        #6b7a94;

            --font-display: 'Instrument Sans', -apple-system, sans-serif;
            --font-mono:    'DM Mono', 'Menlo', monospace;

            --radius:    8px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --shadow-card: 0 4px 24px rgba(0,0,0,0.4), 0 0 1px rgba(255,255,255,0.05);
            --shadow-glow: 0 0 40px rgba(77,142,255,0.06);
        }

        body {
            font-family: var(--font-display);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ═══ SIDEBAR ═══ */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 240px;
            background: var(--bg-primary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 28px 24px 24px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .brand-logo {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .brand-logo .gmt {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .brand-logo .dot-ai {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .brand-sub {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .brand-sub span {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .brand-sub .version-tag {
            font-family: var(--font-mono);
            font-size: 9px;
            padding: 2px 6px;
            background: var(--accent-glow);
            color: var(--accent);
            border-radius: 4px;
            border: 1px solid rgba(77,142,255,0.15);
        }

        .sidebar-nav {
            padding: 20px 0;
            flex: 1;
        }

        .nav-section-label {
            padding: 8px 24px 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.2s;
            border-left: 2px solid transparent;
            position: relative;
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.02);
        }

        .nav-item.active {
            color: var(--accent-bright);
            background: var(--accent-glow);
            border-left-color: var(--accent);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 2px;
            box-shadow: 0 0 12px var(--accent);
        }

        .nav-icon { width: 18px; text-align: center; font-size: 15px; }

        .sidebar-footer {
            padding: 18px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2.5s infinite;
        }

        .status-text {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ═══ MAIN ═══ */
        .main {
            margin-left: 240px;
            min-height: 100vh;
            background: var(--bg-deep);
        }

        .topbar {
            padding: 18px 36px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-primary);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-left h2 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .topbar-breadcrumb {
            font-size: 12px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .clock {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            padding: 5px 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .content { padding: 28px 36px; }

        /* ═══ CARDS ═══ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(77,142,255,0.15), transparent);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
        }

        /* ═══ STAT CARDS ═══ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px 24px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            opacity: 0.8;
        }

        .stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent), transparent); }
        .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--success), transparent); }
        .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--danger), transparent); }
        .stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--warning), transparent); }
        .stat-card:nth-child(5)::before { background: linear-gradient(90deg, var(--gold), transparent); }

        .stat-card:hover {
            border-color: var(--border-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-card), var(--shadow-glow);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -1px;
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            font-family: var(--font-mono);
        }

        /* ═══ TABLE ═══ */
        .table-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }

        th {
            text-align: left;
            padding: 10px 14px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        tr { transition: background 0.15s; }
        tr:hover td { background: rgba(255,255,255,0.015); }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            font-family: var(--font-mono);
            letter-spacing: 0.3px;
        }

        .badge-success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(52,211,153,0.15); }
        .badge-danger  { background: var(--danger-bg);  color: var(--danger);  border: 1px solid rgba(248,113,113,0.15); }
        .badge-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(251,191,36,0.15); }
        .badge-a { background: rgba(251,191,36,0.08);  color: var(--grade-a); border: 1px solid rgba(251,191,36,0.15); }
        .badge-b { background: var(--accent-glow);      color: var(--accent);  border: 1px solid rgba(77,142,255,0.15); }
        .badge-c { background: rgba(107,122,148,0.08);  color: var(--grade-c); border: 1px solid rgba(107,122,148,0.15); }
        .badge-info { background: var(--accent-glow); color: var(--accent-bright); border: 1px solid rgba(77,142,255,0.15); }

        .mono { font-family: var(--font-mono); font-size: 12px; }

        /* ═══ BUTTONS ═══ */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-display);
            text-decoration: none;
            white-space: nowrap;
        }

        .btn:hover {
            border-color: var(--border-accent);
            background: var(--bg-elevated);
            box-shadow: 0 0 20px rgba(77,142,255,0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3d7aed, #5a95ff);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 2px 12px rgba(77,142,255,0.25);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4d87f5, #6ea3ff);
            box-shadow: 0 4px 20px rgba(77,142,255,0.35);
            transform: translateY(-1px);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #34d399);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 2px 12px rgba(52,211,153,0.2);
        }

        .btn-gold {
            background: linear-gradient(135deg, #b8922e, #d4a853);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 2px 12px rgba(212,168,83,0.2);
        }

        .btn-danger {
            background: transparent;
            border-color: rgba(248,113,113,0.3);
            color: var(--danger);
        }

        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* ═══ FORMS ═══ */
        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 14px;
            font-family: var(--font-display);
            transition: all 0.2s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px var(--accent-glow);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.7;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* ═══ PROGRESS ═══ */
        .progress-bar {
            height: 4px;
            background: var(--bg-primary);
            border-radius: 2px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-bright));
            border-radius: 2px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--accent-glow-strong);
        }

        .progress-text { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }

        /* ═══ MODAL ═══ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 640px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 1px rgba(255,255,255,0.1);
        }

        .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        /* ═══ TOAST ═══ */
        .toast-container {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(12px);
        }

        .toast-success { background: rgba(16,42,32,0.95); border: 1px solid rgba(52,211,153,0.3); color: var(--success); }
        .toast-error   { background: rgba(42,16,16,0.95); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); }
        .toast-info    { background: rgba(16,24,42,0.95); border: 1px solid rgba(77,142,255,0.3);  color: var(--accent-bright); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }
        .empty-state-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }

        /* ═══ TABS ═══ */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 22px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover { color: var(--text-secondary); }
        .tab.active { color: var(--accent-bright); border-bottom-color: var(--accent); }

        /* ═══ PIPELINE FLOW ═══ */
        .pipeline {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 20px 0;
            margin-bottom: 24px;
        }

        .pipeline-step {
            flex: 1;
            text-align: center;
            padding: 14px 8px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pipeline-step::after {
            content: '';
            position: absolute;
            right: -2px; top: 50%;
            transform: translateY(-50%);
            width: 0; height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 8px solid var(--border-light);
            z-index: 1;
        }

        .pipeline-step:last-child::after { display: none; }

        .pipeline-num {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1.5px solid var(--border-light);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .pipeline-step.active .pipeline-num {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 14px rgba(77,142,255,0.4);
        }

        .pipeline-step.done .pipeline-num {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }

        .pipeline-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
        }

        .pipeline-step.active .pipeline-label { color: var(--accent-bright); }
        .pipeline-step.done .pipeline-label { color: var(--success); }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 768px) {
            .sidebar { width: 64px; }
            .sidebar-brand .brand-sub, .nav-label, .sidebar-footer .status-text { display: none; }
            .brand-logo .gmt { font-size: 16px; }
            .brand-logo .dot-ai { font-size: 16px; }
            .nav-item { justify-content: center; padding: 14px; }
            .main { margin-left: 64px; }
            .content { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }

        /* ═══ STAGGER ANIMATION ═══ */
        .fade-in {
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 0.4s ease forwards;
        }
        .fade-in:nth-child(1) { animation-delay: 0.05s; }
        .fade-in:nth-child(2) { animation-delay: 0.10s; }
        .fade-in:nth-child(3) { animation-delay: 0.15s; }
        .fade-in:nth-child(4) { animation-delay: 0.20s; }
        .fade-in:nth-child(5) { animation-delay: 0.25s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- SIDEBAR -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <span class="gmt">GMT</span><span class="dot-ai">.AI</span>
            </div>
            <div class="brand-sub">
                <span>钢贸通</span>
                <span class="version-tag">v3.0</span>
            </div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-section-label">核心功能</div>
            <a href="/" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">📊</span>
                <span class="nav-label">总览看板</span>
            </a>
            <a href="/leads" class="nav-item {% if active_page == 'leads' %}active{% endif %}">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">找客户</span>
            </a>
            <a href="/send" class="nav-item {% if active_page == 'send' %}active{% endif %}">
                <span class="nav-icon">✉️</span>
                <span class="nav-label">发邮件</span>
            </a>
            <div class="nav-section-label" style="margin-top: 12px;">工具</div>
            <a href="/mtc" class="nav-item {% if active_page == 'mtc' %}active{% endif %}">
                <span class="nav-icon">📋</span>
                <span class="nav-label">MTC证书</span>
            </a>
            <a href="/settings" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">个人中心</span>
            </a>
            <a href="/logout" class="nav-item" style="margin-top: 4px;">
                <span class="nav-icon">🚪</span>
                <span class="nav-label">退出登录</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <div class="status-dot"></div>
            <span class="status-text">{{ current_user }} · 在线</span>
        </div>
    </nav>

    <!-- MAIN -->
    <div class="main">
        <div class="topbar">
            <div class="topbar-left">
                <h2>{% block page_title %}总览{% endblock %}</h2>
                <span class="topbar-breadcrumb">{% block breadcrumb %}{% endblock %}</span>
            </div>
            <div class="topbar-right">
                <span class="clock" id="clock"></span>
            </div>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function updateClock() {
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            document.getElementById('clock').textContent =
                `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        function showToast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 4000);
        }

        async function apiCall(url, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            return res.json();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
